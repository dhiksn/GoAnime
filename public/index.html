<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp  Home</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <style>
    /*  TOP 10 SLIDER  */
    .top10-wrapper {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0 1.5rem;
    }
    .top10-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding: 0 1.5rem;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }
    .top10-header .section-title { margin-bottom: 0; }

    .slider-nav { display: flex; gap: .4rem; }
    .slider-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem; line-height: 1;
      transition: var(--transition); color: var(--text-primary);
    }
    .slider-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .slider-track-outer {
      overflow: hidden;
      padding: 0 1.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }
    .slider-track {
      display: flex;
      gap: 1rem;
      transition: transform .35s ease;
      will-change: transform;
    }

    /* Setiap card slider */
    .top10-card {
      flex: 0 0 calc((100% - 5 * 1rem) / 6); /* 6 card visible */
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
    }
    .top10-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .top10-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .top10-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .3s ease;
    }
    .top10-card:hover .top10-card-thumb img { transform: scale(1.05); }

    /* Rank badge pojok kiri atas  "TOP" kecil + angka besar */
    .top10-rank {
      position: absolute;
      top: 6px; left: 6px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 5px 10px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      min-width: 42px;
    }
    .top10-rank .rank-top {
      font-size: .55rem;
      font-weight: 800;
      letter-spacing: .12em;
      color: #aaa;
      text-transform: uppercase;
    }
    .top10-rank .rank-num {
      font-size: 1.6rem;
      font-weight: 900;
      color: #ddd;
      margin-top: 1px;
    }

    /* Score badge pojok kanan atas */
    .top10-score {
      position: absolute;
      top: 6px; right: 6px;
      font-size: .75rem;
      font-weight: 700;
      background: rgba(0,0,0,.65);
      color: #f4a261;
      padding: 4px 9px;
      border-radius: 5px;
      backdrop-filter: blur(4px);
    }

    /* Judul overlay di dalam gambar */
    .top10-card-info { display: none; }
    .top10-card-title {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2.5rem .65rem .65rem;
      background: linear-gradient(to top, rgba(0,0,0,.88) 55%, transparent);
      font-size: .78rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .top10-card { flex: 0 0 calc((100% - 3 * 1rem) / 4); }
    }
    @media (max-width: 560px) {
      .top10-card { flex: 0 0 calc((100% - 2 * 1rem) / 3); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/"> <span>MiruApp</span></a>
  <ul class="navbar-nav">
    <li><a href="/" class="active">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li><li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:.75rem">
    <div class="navbar-search">
      <input type="text" id="navSearch" placeholder="Cari anime..." />
      <button onclick="doNavSearch()">Cari</button>
    </div>
    <div id="navAuth"></div>
  </div>
</nav>

<!--  TOP 10 SLIDER (paling atas)  -->
<div class="top10-wrapper">
  <div class="top10-header">
    <div class="section-title"> Top 10 Minggu Ini</div>
    <div class="slider-nav">
      <button class="slider-btn" onclick="slideTop10(-1)">&#8249;</button>
      <button class="slider-btn" onclick="slideTop10(1)">&#8250;</button>
    </div>
  </div>
  <div class="slider-track-outer">
    <div class="slider-track" id="top10Track">
      <div class="loading-overlay" style="width:100%;padding:3rem 0">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<!--  MAIN CONTENT  -->
<div class="container">

  <!-- RECENT EPISODES -->
  <section class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div class="section-title" style="margin-bottom:0">Anime Terbaru</div>
      <a href="/recent" style="font-size:.82rem;color:var(--accent);font-weight:600;text-decoration:none;transition:.2s" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">View All </a>
    </div>
    <div id="recentGrid" class="episode-grid">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuat data...</span></div>
    </div>
  </section>

  <!-- MOVIES -->
  <section class="section">
    <div class="section-title">Movie Terbaru</div>
    <div id="movieGrid" class="anime-grid">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <a href="/movies" class="page-btn">Lihat Semua Movie </a>
    </div>
  </section>

</div>

<footer>
  <p>MiruApp Wrapper &copy; 2024  Data dari <a href="#">MiruApp</a></p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script>
  initNavSearch();
  renderAuthNav();

  /*  Slider state  */
  let sliderIndex  = 0;
  let sliderTotal  = 0;
  let visibleCount = 5;

  function getVisible() {
    const w = window.innerWidth;
    if (w <= 560) return 3;
    if (w <= 900) return 4;
    return 6;
  }

  function slideTop10(dir) {
    visibleCount = getVisible();
    const maxIndex = Math.max(0, sliderTotal - visibleCount);
    sliderIndex = Math.min(Math.max(sliderIndex + dir, 0), maxIndex);

    const track     = document.getElementById('top10Track');
    const cardWidth = track.querySelector('.top10-card')?.offsetWidth || 0;
    const gap       = 16; // 1rem
    track.style.transform = `translateX(-${sliderIndex * (cardWidth + gap)}px)`;
  }

  window.addEventListener('resize', () => {
    visibleCount = getVisible();
    sliderIndex  = 0;
    const track  = document.getElementById('top10Track');
    if (track) track.style.transform = 'translateX(0)';
  });

  function rankClass(rank) {
    if (rank === 1) return 'rank-gold';
    if (rank === 2) return 'rank-silver';
    if (rank === 3) return 'rank-bronze';
    return '';
  }

  /*  Load home data  */
  async function loadHome() {
    try {
      const res  = await fetch(`${API}/api/home`);
      const json = await res.json();
      const data = json.data || {};

      /* Top 10 slider */
      const top10 = data.top10?.animeList || [];
      sliderTotal  = top10.length;
      const track  = document.getElementById('top10Track');
      track.innerHTML = top10.length
        ? top10.map(a => `
            <div class="top10-card" onclick="MiruApp('${a.animeId || ''}')">
              <div class="top10-card-thumb">
                <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
                     loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
                <span class="top10-rank ${rankClass(a.rank)}">
                  <span class="rank-top">TOP</span>
                  <span class="rank-num">${a.rank}</span>
                </span>
                ${a.score && a.score !== '0'
                  ? `<span class="top10-score">&#11088; ${a.score}</span>`
                  : ''}
                <div class="top10-card-title">${a.title}</div>
              </div>
            </div>`).join('')
        : emptyHTML('', 'Tidak ada data');

      /* Recent */
      const recent   = data.recent?.animeList || [];
      const recentEl = document.getElementById('recentGrid');
      recentEl.innerHTML = recent.length
        ? recent.map(recentCard).join('')
        : emptyHTML('', 'Tidak ada episode terbaru');

      /* Movies */
      const movies   = data.movie?.animeList || [];
      const movieEl  = document.getElementById('movieGrid');
      movieEl.innerHTML = movies.length
        ? movies.slice(0, 12).map(a => {
            const genres = (a.genreList || []).slice(0,2).map(g => g.title).join(', ');
            const score  = a.score && a.score !== '0' && a.score !== '' ? a.score : null;
            return `
            <div class="anime-card" onclick="MiruApp('${a.animeId || ''}')">
              <div class="anime-card-thumb">
                <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
                     loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
                <span class="anime-card-badge" style="background:#7b2d8b">Movie</span>
                ${score ? `<span class="anime-card-badge" style="background:rgba(0,0,0,.65);left:auto;right:6px;color:#f4a261">&#11088; ${score}</span>` : ''}
                <div class="anime-card-info">
                  <div class="anime-card-title">${a.title}</div>
                  <div class="anime-card-meta">${genres}</div>
                </div>
              </div>
            </div>`;
          }).join('')
        : emptyHTML('', 'Tidak ada movie');

    } catch (err) {
      document.getElementById('top10Track').innerHTML  = errorHTML(err.message);
      document.getElementById('recentGrid').innerHTML  = errorHTML(err.message);
      document.getElementById('movieGrid').innerHTML   = errorHTML(err.message);
    }
  }

  loadHome();
</script>
</body>
</html>

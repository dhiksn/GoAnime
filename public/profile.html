<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp — Profil</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <style>
    .profile-wrap {
      max-width: 520px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }
    .profile-name {
      font-size: 1.35rem;
      font-weight: 800;
      color: #fff;
    }
    .profile-email {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: .2rem;
    }
    .profile-role {
      display: inline-block;
      margin-top: .4rem;
      padding: .15rem .6rem;
      background: rgba(255,255,255,.08);
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      margin-bottom: .6rem;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      color: #fff;
      font-size: .9rem;
      font-weight: 500;
    }
    .menu-item:hover { background: var(--bg-card); border-color: rgba(255,255,255,.15); }
    .menu-item.danger { color: #ff6b6b; }
    .menu-item.danger:hover { border-color: rgba(230,57,70,.4); background: rgba(230,57,70,.08); }
    .menu-icon { font-size: 1.1rem; opacity: .7; }
    .menu-chevron { margin-left: auto; opacity: .25; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">▶ <span>MiruApp</span></a>
    <div class="navbar-nav" id="navLinks"></div>
  </nav>

  <div class="profile-wrap">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
        <span class="profile-role" id="profileRole">user</span>
      </div>
    </div>

    <hr class="divider" />

    <div class="menu-item" onclick="alert('Coming soon')">
      <span class="menu-icon">🕐</span> Riwayat Tontonan
      <span class="menu-chevron">›</span>
    </div>
    <div class="menu-item" onclick="alert('Coming soon')">
      <span class="menu-icon">❤️</span> Favorit
      <span class="menu-chevron">›</span>
    </div>

    <hr class="divider" />

    <div class="menu-item danger" onclick="doLogout()">
      <span class="menu-icon">🚪</span> Keluar
      <span class="menu-chevron">›</span>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('auth_token');
    const user  = JSON.parse(localStorage.getItem('auth_user') || 'null');

    if (!token || !user) {
      window.location.href = '/login';
    } else {
      const initial = (user.username || '?')[0].toUpperCase();
      document.getElementById('profileAvatar').textContent = initial;
      document.getElementById('profileName').textContent   = user.username || '—';
      document.getElementById('profileEmail').textContent  = user.email    || '—';
      document.getElementById('profileRole').textContent   = (user.role || 'user').toUpperCase();
    }

    // Navbar
    const nav = document.getElementById('navLinks');
    if (token && user) {
      nav.innerHTML = `
        <a href="/">Beranda</a>
        <a href="/profile" class="active" style="color:var(--accent)">${(user.username||'?')[0].toUpperCase()} ${user.username}</a>`;
    } else {
      nav.innerHTML = `<a href="/">Beranda</a><a href="/login">Masuk</a>`;
    }

    function doLogout() {
      if (!confirm('Yakin ingin keluar?')) return;
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_user');
      window.location.href = '/';
    }
  </script>
</body>
</html>

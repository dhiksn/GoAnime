<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Movies  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/"> <span>MiruApp</span></a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies" class="active">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-search">
    <input type="text" id="navSearch" placeholder="Cari anime..." />
    <button onclick="doNavSearch()">Cari</button>
  </div>
</nav>

<div class="page-header">
  <h1>Anime <span>Movies</span></h1>
  <p>Koleksi film anime terlengkap</p>
</div>

<div class="container">
  <section class="section">
    <div id="grid" class="anime-grid"></div>
    <div id="pagination" class="pagination"></div>
  </section>
</div>

<footer><p>MiruApp Wrapper &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script>
  initNavSearch();

  function movieCard(a) {
    const genres = (a.genreList || []).slice(0, 2).map(g => g.title).join(', ');
    const score  = a.score && a.score !== '0' && a.score !== '' ? a.score : null;
    return `
      <div class="anime-card" onclick="MiruApp('${a.animeId || ''}')">
        <div class="anime-card-thumb">
          <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}" loading="lazy"
               onerror="this.src='/img/placeholder.svg'"/>
          <span class="anime-card-badge" style="background:#7b2d8b">Movie</span>
          ${score ? `<span class="anime-card-badge" style="background:rgba(0,0,0,.65);left:auto;right:6px;color:#f4a261">&#11088; ${score}</span>` : ''}
          <div class="anime-card-info">
            <div class="anime-card-title">${a.title}</div>
            <div class="anime-card-meta">${genres}</div>
          </div>
        </div>
      </div>`;
  }

  async function loadPage(page) {
    const grid = document.getElementById('grid');
    grid.innerHTML = loadingHTML();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    try {
      const res  = await fetch(`${API}/api/movies?page=${page}`);
      const json = await res.json();
      const list = json.data?.animeList || [];
      grid.innerHTML = list.length ? list.map(movieCard).join('') : emptyHTML('', 'Tidak ada movie');
      renderPagination('pagination', page, list.length >= 10, 'loadPage');
    } catch (err) {
      grid.innerHTML = errorHTML(err.message);
    }
  }

  const p = new URLSearchParams(location.search);
  loadPage(parseInt(p.get('page')) || 1);
</script>
</body>
</html>

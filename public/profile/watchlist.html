<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp — Watchlist</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <style>
    .watchlist-container {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .watchlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .watchlist-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .watchlist-count {
      font-size: .85rem;
      color: var(--text-muted);
      margin-left: .75rem;
    }
    .header-actions {
      display: flex;
      gap: .75rem;
    }
    .filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: .5rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .clear-btn {
      background: rgba(230,57,70,.15);
      border: 1px solid rgba(230,57,70,.3);
      color: #ff6b6b;
      padding: .5rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .clear-btn:hover {
      background: rgba(230,57,70,.25);
      border-color: rgba(230,57,70,.5);
    }
    .watchlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .watchlist-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      position: relative;
    }
    .watchlist-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .watchlist-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .watchlist-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .3s ease;
    }
    .watchlist-card:hover .watchlist-card-thumb img {
      transform: scale(1.05);
    }
    .status-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      z-index: 2;
    }
    .status-badge.planning { color: #ffd93d; }
    .status-badge.watching { color: #6bcf7f; }
    .status-badge.completed { color: #4a9eff; }
    .status-badge.dropped { color: #ff6b6b; }
    .remove-btn {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(230,57,70,.9);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s;
      z-index: 2;
      font-size: .9rem;
    }
    .watchlist-card:hover .remove-btn {
      opacity: 1;
    }
    .watchlist-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2.5rem .7rem .7rem;
      background: linear-gradient(to top, rgba(0,0,0,.85) 50%, transparent);
    }
    .watchlist-card-title {
      font-size: .8rem;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .watchlist-card-meta {
      margin-top: .35rem;
      font-size: .7rem;
      color: rgba(255,255,255,.6);
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: .5;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: .5rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">▶ <span>MiruApp</span></a>
    <ul class="navbar-nav">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing">Ongoing</a></li>
      <li><a href="/movies">Movies</a></li>
    </ul>
    <div id="navAuth"></div>
  </nav>

  <div class="watchlist-container">
    <div class="watchlist-header">
      <div>
        <span class="watchlist-title">📋 Watchlist</span>
        <span class="watchlist-count" id="watchlistCount">0 anime</span>
      </div>
      <div class="header-actions">
        <button class="filter-btn active" data-status="all" onclick="filterByStatus('all')">Semua</button>
        <button class="filter-btn" data-status="planning" onclick="filterByStatus('planning')">Rencana</button>
        <button class="filter-btn" data-status="watching" onclick="filterByStatus('watching')">Menonton</button>
        <button class="filter-btn" data-status="completed" onclick="filterByStatus('completed')">Selesai</button>
        <button class="filter-btn" data-status="dropped" onclick="filterByStatus('dropped')">Berhenti</button>
        <button class="clear-btn" onclick="clearWatchlist()">Hapus Semua</button>
      </div>
    </div>

    <div id="watchlistGrid" class="watchlist-grid">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span>Memuat watchlist...</span>
      </div>
    </div>
  </div>

  <footer>
    <p>MiruApp Wrapper &copy; 2024  Data dari <a href="#">MiruApp</a></p>
  </footer>

  <script src="/js/helpers.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    renderAuthNav();

    let currentFilter = 'all';

    const statusLabels = {
      planning: 'Rencana',
      watching: 'Menonton',
      completed: 'Selesai',
      dropped: 'Berhenti'
    };

    function loadWatchlist() {
      const watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
      const gridEl = document.getElementById('watchlistGrid');
      const countEl = document.getElementById('watchlistCount');

      // Filter berdasarkan status
      const filtered = currentFilter === 'all' 
        ? watchlist 
        : watchlist.filter(item => item.status === currentFilter);

      countEl.textContent = `${filtered.length} anime`;

      if (!filtered.length) {
        const message = currentFilter === 'all' 
          ? 'Tambahkan anime ke watchlist untuk melihatnya di sini'
          : `Tidak ada anime dengan status "${statusLabels[currentFilter]}"`;
        
        gridEl.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1">
            <div class="icon">📋</div>
            <h3>Watchlist Kosong</h3>
            <p>${message}</p>
          </div>
        `;
        return;
      }

      // Reverse untuk menampilkan yang terbaru dulu
      const reversed = [...filtered].reverse();

      gridEl.innerHTML = reversed.map((anime) => {
        const actualIndex = watchlist.findIndex(w => w.animeId === anime.animeId);
        const genres = (anime.genres || []).slice(0, 2).join(', ');
        
        return `
          <div class="watchlist-card" onclick="goToAnime('${anime.animeId}')">
            <div class="watchlist-card-thumb">
              <img src="${anime.poster || '/img/placeholder.svg'}" 
                   alt="${anime.title}"
                   loading="lazy"
                   onerror="this.src='/img/placeholder.svg'"/>
              <button class="remove-btn" onclick="event.stopPropagation(); removeFromWatchlist(${actualIndex})" title="Hapus dari watchlist">
                ✕
              </button>
              <span class="status-badge ${anime.status}">${statusLabels[anime.status] || anime.status}</span>
              <div class="watchlist-card-info">
                <div class="watchlist-card-title">${anime.title}</div>
                ${genres ? `<div class="watchlist-card-meta">${genres}</div>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterByStatus(status) {
      currentFilter = status;
      
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
      });
      
      loadWatchlist();
    }

    function goToAnime(animeId) {
      window.location.href = `/anime?id=${animeId}`;
    }

    function removeFromWatchlist(index) {
      const watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
      watchlist.splice(index, 1);
      localStorage.setItem('watchlist', JSON.stringify(watchlist));
      loadWatchlist();
    }

    function clearWatchlist() {
      if (!confirm('Hapus semua anime dari watchlist?')) return;
      
      localStorage.removeItem('watchlist');
      loadWatchlist();
    }

    // Helper functions untuk digunakan di halaman lain
    window.addToWatchlist = function(anime, status = 'planning') {
      const watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
      const existing = watchlist.find(w => w.animeId === anime.animeId);
      
      if (existing) {
        existing.status = status;
        existing.updatedAt = new Date().toISOString();
      } else {
        watchlist.push({
          animeId: anime.animeId,
          title: anime.title,
          poster: anime.poster,
          genres: anime.genres,
          status: status,
          addedAt: new Date().toISOString()
        });
      }
      
      localStorage.setItem('watchlist', JSON.stringify(watchlist));
    };

    window.isInWatchlist = function(animeId) {
      const watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
      return watchlist.find(w => w.animeId === animeId);
    };

    loadWatchlist();
  </script>
</body>
</html>

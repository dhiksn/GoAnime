<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp — Favorit</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <style>
    .favorites-container {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .favorites-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .favorites-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .favorites-count {
      font-size: .85rem;
      color: var(--text-muted);
      margin-left: .75rem;
    }
    .clear-btn {
      background: rgba(230,57,70,.15);
      border: 1px solid rgba(230,57,70,.3);
      color: #ff6b6b;
      padding: .5rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .clear-btn:hover {
      background: rgba(230,57,70,.25);
      border-color: rgba(230,57,70,.5);
    }
    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .favorite-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      position: relative;
    }
    .favorite-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .favorite-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .favorite-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .3s ease;
    }
    .favorite-card:hover .favorite-card-thumb img {
      transform: scale(1.05);
    }
    .favorite-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      z-index: 2;
    }
    .remove-btn {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(230,57,70,.9);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s;
      z-index: 2;
      font-size: .9rem;
    }
    .favorite-card:hover .remove-btn {
      opacity: 1;
    }
    .favorite-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2.5rem .7rem .7rem;
      background: linear-gradient(to top, rgba(0,0,0,.85) 50%, transparent);
    }
    .favorite-card-title {
      font-size: .8rem;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .favorite-card-meta {
      margin-top: .35rem;
      font-size: .7rem;
      color: rgba(255,255,255,.6);
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: .5;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: .5rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/"> <span>MiruApp</span></a>
    <ul class="navbar-nav">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing">Ongoing</a></li>
      <li><a href="/movies">Movies</a></li>
      <li><a href="/schedule">Jadwal</a></li>
      <li><a href="/batch">Batch</a></li>
      <li><a href="/daftar-anime">Daftar Anime</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="navbar-search">
        <input type="text" id="navSearch" placeholder="Cari anime..." />
        <button onclick="doNavSearch()">Cari</button>
      </div>
      <div id="navAuth"></div>
    </div>
  </nav>

  <div class="favorites-container">
    <div class="favorites-header">
      <div>
        <span class="favorites-title">❤️ Favorit</span>
        <span class="favorites-count" id="favCount">0 anime</span>
      </div>
      <button class="clear-btn" onclick="clearFavorites()">Hapus Semua</button>
    </div>

    <div id="favoritesGrid" class="favorites-grid">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span>Memuat favorit...</span>
      </div>
    </div>
  </div>

  <footer>
    <p>MiruApp Wrapper &copy; 2024  Data dari <a href="#">MiruApp</a></p>
  </footer>

  <script src="/js/helpers.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    initNavSearch();
    renderAuthNav();

    // Redirect jika belum login
    if (!Auth.isLoggedIn()) window.location.href = '/login';

    async function loadFavorites() {
      const gridEl  = document.getElementById('favoritesGrid');
      const countEl = document.getElementById('favCount');
      gridEl.innerHTML = '<div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div><span>Memuat favorit...</span></div>';

      try {
        const res  = await authFetch('/api/user/favorites');
        const json = await res.json();

        if (!json.success) throw new Error(json.message);

        const favorites = json.data || [];
        countEl.textContent = `${favorites.length} anime`;

        if (!favorites.length) {
          gridEl.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="icon">💔</div>
              <h3>Belum Ada Favorit</h3>
              <p>Tambahkan anime favorit untuk melihatnya di sini</p>
            </div>`;
          return;
        }

        gridEl.innerHTML = favorites.map(anime => {
          const slug = encodeURIComponent(anime.video_slug);
          return `
            <div class="favorite-card" onclick="window.location.href='/anime?slug=${anime.video_slug}'">
              <div class="favorite-card-thumb">
                <img src="${anime.video_cover_url || '/img/placeholder.svg'}"
                     alt="${anime.video_title || ''}"
                     loading="lazy"
                     onerror="this.src='/img/placeholder.svg'"/>
                <button class="remove-btn"
                  onclick="event.stopPropagation(); removeFavorite('${slug}')"
                  title="Hapus dari favorit">✕</button>
                <span class="favorite-badge">❤️</span>
                <div class="favorite-card-info">
                  <div class="favorite-card-title">${anime.video_title || anime.video_slug}</div>
                </div>
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        gridEl.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><h3>Gagal memuat</h3><p>${err.message}</p></div>`;
      }
    }

    async function removeFavorite(slug) {
      await authFetch(`/api/user/favorites/${slug}`, { method: 'DELETE' });
      loadFavorites();
    }

    async function clearFavorites() {
      if (!confirm('Hapus semua anime dari favorit?')) return;
      await authFetch('/api/user/favorites', { method: 'DELETE' });
      loadFavorites();
    }

    loadFavorites();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp — Riwayat Tontonan</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <style>
    .history-container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .history-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .clear-btn {
      background: rgba(230,57,70,.15);
      border: 1px solid rgba(230,57,70,.3);
      color: #ff6b6b;
      padding: .5rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .clear-btn:hover {
      background: rgba(230,57,70,.25);
      border-color: rgba(230,57,70,.5);
    }
    .history-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }
    .history-item:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .history-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .history-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .3s ease;
    }
    .history-item:hover .history-thumb img { transform: scale(1.05); }
    .history-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,.2);
    }
    .history-progress-bar {
      height: 100%;
      background: var(--accent);
    }
    .history-remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(230,57,70,.9);
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s;
      font-size: .8rem;
      z-index: 2;
    }
    .history-item:hover .history-remove-btn { opacity: 1; }
    .history-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem .65rem .65rem;
      background: linear-gradient(to top, rgba(0,0,0,.88) 55%, transparent);
    }
    .history-card-title {
      font-size: .78rem;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.35;
    }
    .history-card-meta {
      font-size: .68rem;
      color: rgba(255,255,255,.55);
      margin-top: .25rem;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      grid-column: 1/-1;
    }
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: .5;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: .5rem;
    }
    @media (max-width: 600px) {
      .history-thumb {
        width: 100px;
        min-width: 100px;
      }
      .history-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/"> <span>MiruApp</span></a>
    <ul class="navbar-nav">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing">Ongoing</a></li>
      <li><a href="/movies">Movies</a></li>
      <li><a href="/schedule">Jadwal</a></li>
      <li><a href="/batch">Batch</a></li>
      <li><a href="/daftar-anime">Daftar Anime</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="navbar-search">
        <input type="text" id="navSearch" placeholder="Cari anime..." />
        <button onclick="doNavSearch()">Cari</button>
      </div>
      <div id="navAuth"></div>
    </div>
  </nav>

  <div class="history-container">
    <div class="history-header">
      <div class="history-title">🕐 Riwayat Tontonan</div>
      <button class="clear-btn" onclick="clearHistory()">Hapus Semua</button>
    </div>

    <div id="historyList" class="history-list">
      <div class="loading-overlay" style="grid-column:1/-1">
        <div class="spinner"></div>
        <span>Memuat riwayat...</span>
      </div>
    </div>
  </div>

  <footer>
    <p>MiruApp Wrapper &copy; 2024  Data dari <a href="#">MiruApp</a></p>
  </footer>

  <script src="/js/helpers.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    initNavSearch();
    renderAuthNav();

    // Redirect jika belum login
    if (!Auth.isLoggedIn()) window.location.href = '/login';

    async function loadHistory() {
      const listEl = document.getElementById('historyList');
      listEl.innerHTML = '<div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div><span>Memuat riwayat...</span></div>';

      try {
        const res  = await authFetch('/api/user/history');
        const json = await res.json();

        if (!json.success) throw new Error(json.message);

        const history = json.data || [];

        if (!history.length) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="icon">📺</div>
              <h3>Belum Ada Riwayat</h3>
              <p>Mulai menonton anime untuk melihat riwayat di sini</p>
            </div>`;
          return;
        }

        listEl.innerHTML = history.map(item => {
          const date    = item.last_watched ? new Date(item.last_watched) : null;
          const dateStr = date ? date.toLocaleDateString('id-ID', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          }) : '';
          const progress = item.watch_progress || 0;
          const slug     = encodeURIComponent(item.video_slug);

          return `
            <div class="history-item" onclick="window.location.href='/episode?slug=${item.video_slug}'">
              <div class="history-thumb">
                <img src="${item.video_cover_url || '/img/placeholder.svg'}"
                     alt="${item.video_title || ''}"
                     onerror="this.src='/img/placeholder.svg'"/>
                <button class="history-remove-btn"
                  onclick="event.stopPropagation(); removeItem('${slug}')"
                  title="Hapus">✕</button>
                ${progress > 0 ? `
                  <div class="history-progress">
                    <div class="history-progress-bar" style="width:${progress}%"></div>
                  </div>` : ''}
                <div class="history-card-info">
                  <div class="history-card-title">${item.video_title || item.video_slug}</div>
                  <div class="history-card-meta">
                    ${dateStr}${progress > 0 ? ` · ${progress}%` : ''}
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Gagal memuat</h3><p>${err.message}</p></div>`;
      }
    }

    async function removeItem(slug) {
      if (!confirm('Hapus item ini dari riwayat?')) return;
      await authFetch(`/api/user/history/${slug}`, { method: 'DELETE' });
      loadHistory();
    }

    async function clearHistory() {
      if (!confirm('Hapus semua riwayat tontonan?')) return;
      await authFetch('/api/user/history', { method: 'DELETE' });
      loadHistory();
    }

    loadHistory();
  </script>
</body>
</html>

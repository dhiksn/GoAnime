<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Tayang  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <!-- Font: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Icons: Lucid -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --font-main: 'Outfit', sans-serif;
    }
    body {
      font-family: var(--font-main);
    }

    /*  PAGE HEADER  */
    .schedule-header {
      padding: 3rem 0;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border);
      text-align: center;
      margin-bottom: 2rem;
    }
    .schedule-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .schedule-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /*  DAY TABS  */
    .day-tabs-wrapper {
      margin-bottom: 2.5rem;
      overflow-x: auto;
      padding-bottom: 5px;
    }
    .day-tabs-wrapper::-webkit-scrollbar { height: 4px; }
    .day-tabs-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .day-tabs {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      min-width: max-content;
      padding: 0 1rem;
    }
    .day-tab {
      padding: 0.75rem 1.5rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }
    .day-tab:hover {
      border-color: var(--accent);
      color: #fff;
      background: rgba(230, 57, 70, 0.05);
    }
    .day-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3);
      transform: translateY(-2px);
    }

    /*  SCHEDULE CARD GRID  */
    .schedule-anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .schedule-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    .schedule-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      border-color: var(--accent);
    }

    /* Poster */
    .schedule-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .schedule-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .schedule-card:hover .schedule-card-thumb img { transform: scale(1.1); }

    /* Badges */
    .card-badge {
      position: absolute;
      top: 10px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      z-index: 2;
      backdrop-filter: blur(4px);
    }
    .badge-type {
      left: 10px;
      background: rgba(41, 182, 246, 0.85);
      color: #fff;
    }
    .badge-score {
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Info Overlay */
    .schedule-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem 1rem 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 30%, rgba(0,0,0,0.5) 70%, transparent);
      z-index: 1;
    }
    .schedule-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }
    .schedule-card-time {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.9;
    }

    @media (max-width: 900px) {
      .schedule-anime-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .schedule-header h1 { font-size: 1.8rem; }
    }
    @media (max-width: 600px) {
      .day-tab { padding: 0.6rem 1.1rem; font-size: 0.85rem; }
      .schedule-anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container" style="display: flex; width: 100%; align-items: center; justify-content: space-between; padding: 0;">
    <a class="navbar-brand" href="/"> <span>MiruApp</span></a>
    <ul class="navbar-nav">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing">Ongoing</a></li>
      <li><a href="/movies">Movies</a></li>
      <li><a href="/schedule" class="active">Jadwal</a></li>
      <li><a href="/batch">Batch</a></li><li><a href="/daftar-anime">Daftar Anime</a></li>
    </ul>
    <div class="navbar-search">
      <input type="text" id="navSearch" placeholder="Cari anime..." />
      <button onclick="doNavSearch()"><i data-lucide="search" style="width:16px;height:16px;"></i></button>
    </div>
  </div>
</nav>

<div class="schedule-header">
  <div class="container">
    <h1>Jadwal Tayang</h1>
    <p>Daftar jadwal rilis anime terbaru setiap harinya</p>
  </div>
</div>

<div class="container" style="padding-bottom:5rem">

  <!-- DAY TABS -->
  <div class="day-tabs-wrapper">
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <!-- ANIME GRID -->
  <div class="schedule-anime-grid" id="animeGrid">
    <div class="loading-overlay" style="grid-column:1/-1">
      <div class="spinner"></div><span>Menyiapkan jadwal rilis...</span>
    </div>
  </div>

</div>

<footer>
  <div class="container">
    <p>MiruApp Wrapper & UI &copy; 2024</p>
  </div>
</footer>

<script src="/js/helpers.js"></script>
<script>
  initNavSearch();

  const DAYS_ID = {
    sunday:'Minggu', monday:'Senin', tuesday:'Selasa',
    wednesday:'Rabu', thursday:'Kamis', friday:'Jumat', saturday:'Sabtu'
  };

  const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  let allDays   = [];
  let activeDay = '';

  function renderTabs() {
    document.getElementById('dayTabs').innerHTML = allDays.map(d => `
      <div class="day-tab ${d.day === activeDay ? 'active' : ''}"
           onclick="switchDay('${d.day}')">
        ${DAYS_ID[d.day.toLowerCase()] || d.day}
      </div>`).join('');
  }

  function switchDay(day) {
    activeDay = day;
    renderTabs();
    renderGrid();
  }

  function renderGrid() {
    const grid  = document.getElementById('animeGrid');
    const found = allDays.find(d => d.day === activeDay);
    const list  = found?.animeList || [];

    if (!list.length) {
      grid.innerHTML = emptyHTML('', 'Tidak ada anime dijadwalkan hari ini');
      return;
    }

    grid.innerHTML = list.map(a => `
      <div class="schedule-card" onclick="MiruApp('${a.animeId || ''}')">
        <div class="schedule-card-thumb">
          <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
               loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
          <span class="card-badge badge-type">${a.type || 'TV'}</span>
          ${a.score && a.score !== '0'
            ? `<span class="card-badge badge-score"><i data-lucide="star" style="width:12px;height:12px;"></i> ${a.score}</span>` : ''}
          <div class="schedule-card-info">
            <div class="schedule-card-title">${a.title}</div>
            <div class="schedule-card-time">
              <i data-lucide="clock" style="width:14px;height:14px;"></i>
              <span>${a.estimation || 'Jam tayang belum pasti'}</span>
            </div>
          </div>
        </div>
      </div>`).join('');
    
    lucide.createIcons();
  }

  async function loadSchedule() {
    try {
      const res  = await fetch(`${API}/api/schedule`);
      const json = await res.json();
      const days = json.data?.days || [];

      allDays = DAY_ORDER
        .map(d => days.find(x => x.day === d))
        .filter(Boolean);

      if (!allDays.length) {
        document.getElementById('animeGrid').innerHTML = emptyHTML('', 'Data jadwal tidak tersedia');
        return;
      }

      const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
      activeDay   = allDays.find(d => d.day === today)?.day || allDays[0].day;

      renderTabs();
      renderGrid();
    } catch (err) {
      document.getElementById('animeGrid').innerHTML = errorHTML(err.message);
    }
  }

  loadSchedule();
</script>
</body>
</html>

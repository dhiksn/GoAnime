<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Download  GoAnime</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .batch-desc {
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }
    .batch-desc strong { color: var(--text-primary); }

    /* Grid card */
    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .batch-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }
    .batch-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    /* Poster */
    .batch-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .batch-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .3s ease;
    }
    .batch-card:hover .batch-card-thumb img { transform: scale(1.05); }

    /* Badge type kiri atas */
    .batch-badge-type {
      position: absolute;
      top: 6px; left: 6px;
      background: #1565c0;
      color: #fff;
      font-size: .6rem; font-weight: 800;
      padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase;
    }

    /* Badge score kanan atas */
    .batch-badge-score {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,.7);
      color: #f4a261;
      font-size: .65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    /* Info overlay di dalam gambar */
    .batch-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2.5rem .65rem .65rem;
      background: linear-gradient(to top, rgba(0,0,0,.75) 40%, transparent);
    }
    .batch-card-title {
      font-size: .78rem; font-weight: 700;
      color: #fff;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.35;
      transform: translateY(0);
      transition: transform .25s ease;
    }
    .batch-card-status {
      font-size: .68rem;
      color: rgba(255,255,255,.6);
      margin-top: .3rem;
      opacity: 0; max-height: 0; overflow: hidden;
      transition: opacity .25s ease, max-height .25s ease;
    }
    .batch-card:hover .batch-card-title { transform: translateY(-6px); }
    .batch-card:hover .batch-card-status { opacity: 1; max-height: 20px; }

    @media (max-width: 600px) {
      .batch-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/"> <span>GoAnime</span></a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch" class="active">Batch</a></li>
  </ul>
  <div class="navbar-search">
    <input type="text" id="navSearch" placeholder="Cari anime..." />
    <button onclick="doNavSearch()">Cari</button>
  </div>
</nav>

<div class="container" style="padding-top:2rem;padding-bottom:3rem">

  <div class="section-title" style="font-size:1.3rem;margin-bottom:1rem">Daftar Batch Anime</div>

  <p class="batch-desc">
    Daftar batch <strong>Anime Sub Indo</strong> lengkap yang bisa kamu tonton di GoAnime.
    Kamu bisa download dan streaming anime Indo terbaru gratis dan berkualitas tinggi.
  </p>

  <div id="grid" class="batch-grid"></div>
  <div id="pagination" class="pagination"></div>

</div>

<footer><p>GoAnime Wrapper &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script>
  initNavSearch();

  function batchCard(b) {
    const id    = b.batchId || b.animeId || b.slug || '';
    const score = b.score && b.score !== '0' && b.score !== '' ? b.score : null;
    return `
      <div class="batch-card" onclick="window.location.href='/batch-detail?slug=${id}'">
        <div class="batch-card-thumb">
          <img src="${b.poster || '/img/placeholder.svg'}" alt="${b.title}"
               loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
          <span class="batch-badge-type">${b.type || 'TV'}</span>
          ${score ? `<span class="batch-badge-score">&#11088; ${score}</span>` : ''}
          <div class="batch-card-info">
            <div class="batch-card-title">${b.title}</div>
            <div class="batch-card-status">${b.status || ''}</div>
          </div>
        </div>
      </div>`;
  }

  async function loadPage(page) {
    const grid = document.getElementById('grid');
    grid.innerHTML = loadingHTML();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    try {
      const res  = await fetch(`${API}/api/batch?page=${page}`);
      const json = await res.json();
      const data = json.data?.batchList || json.data?.animeList || json.data || [];
      grid.innerHTML = data.length ? data.map(batchCard).join('') : emptyHTML('', 'Tidak ada batch');
      renderPagination('pagination', page, data.length >= 10, 'loadPage');
    } catch (err) {
      grid.innerHTML = errorHTML(err.message);
    }
  }

  const p = new URLSearchParams(location.search);
  loadPage(parseInt(p.get('page')) || 1);
</script>
</body>
</html>
